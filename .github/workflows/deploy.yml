name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: vue/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: vue

      - name: Build (local mode)
        run: npx vite build --base=/nw_abp_vue/
        working-directory: vue
        env:
          VITE_PROVIDER_MODE: standalone
          VITE_API_BASE_URL: /api
          VITE_OAUTH_AUTHORITY: https://localhost:44356
          VITE_OAUTH_CLIENT_ID: TodoApp_App
          VITE_APP_NAME: TodoApp

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: vue/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
